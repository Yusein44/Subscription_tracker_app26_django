<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SubTracker Pro{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #09090b; /* Още по-тъмен и плътен фон */
            --card-bg: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Glassmorphism */
        .navbar {
            background-color: rgba(9, 9, 11, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-main);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Table Master Fix */
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-main);
            --bs-table-border-color: var(--border-color);
            --bs-table-hover-bg: rgba(255, 255, 255, 0.03);
            --bs-table-hover-color: var(--text-main);
            margin-bottom: 0;
        }
        .table thead th {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }
        .table td {
            vertical-align: middle;
            padding: 1rem 0.5rem;
        }

        /* Badges & Buttons */
        .badge-cycle {
            padding: 0.4em 0.8em;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
        }
        .btn-primary {
            background-color: var(--accent-blue);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 4px 14px 0 var(--accent-glow);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 6px 20px 0 var(--accent-glow);
            transform: translateY(-1px);
        }

        .action-icon {
            color: var(--text-muted);
            transition: color 0.2s;
            font-size: 1.1rem;
            margin: 0 8px;
        }
        .action-icon:hover { color: white; }
        .action-icon.delete:hover { color: #ef4444; }

        .text-muted, .text-secondary {
            color: #a1a1aa !important;
        }

        .opacity-10 {
            opacity: 0.15 !important;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="{% url 'dashboard' %}">
                <i class="fa-solid fa-layer-group" style="color: var(--accent-blue);"></i>
                <span>SubTracker</span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-4">
                {% if user.is_authenticated %}
                    <span class="small text-muted d-none d-md-block"><i class="fa-solid fa-user me-2"></i>{{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-secondary border-0 text-muted hover-white">
                        <i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Изход
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
